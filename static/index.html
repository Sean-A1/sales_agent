<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a73e8;
    color: #fff;
    padding: 14px 20px;
    font-size: 18px;
    font-weight: 600;
    flex-shrink: 0;
  }
  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a73e8;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #fff;
    color: #222;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .msg.assistant .intent-tag {
    display: inline-block;
    background: #e8f0fe;
    color: #1a73e8;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  #input-area {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
  }
  #msg-input {
    flex: 1;
    padding: 10px 14px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 24px;
    outline: none;
  }
  #msg-input:focus { border-color: #1a73e8; }
  #send-btn {
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.5; cursor: default; }
  .typing { color: #888; font-style: italic; }
</style>
</head>
<body>
<header>Sales Agent</header>

<div id="chat-box"></div>

<form id="input-area" autocomplete="off">
  <input id="msg-input" type="text" placeholder="메시지를 입력하세요..." autofocus>
  <button id="send-btn" type="submit">전송</button>
</form>

<script>
const chatBox = document.getElementById("chat-box");
const form = document.getElementById("input-area");
const input = document.getElementById("msg-input");
const btn = document.getElementById("send-btn");

const sessionId = crypto.randomUUID();

function addMsg(role, text, intent) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  if (role === "assistant" && intent) {
    const tag = document.createElement("div");
    tag.className = "intent-tag";
    tag.textContent = intent;
    el.appendChild(tag);
  }
  const body = document.createElement("div");
  body.textContent = text;
  el.appendChild(body);
  chatBox.appendChild(el);
  chatBox.scrollTop = chatBox.scrollHeight;
  return el;
}

async function send(message) {
  addMsg("user", message);
  input.value = "";
  btn.disabled = true;

  const typing = addMsg("assistant", "응답 생성 중...");
  typing.classList.add("typing");

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message }),
    });
    chatBox.removeChild(typing);

    if (!res.ok) {
      addMsg("assistant", "오류가 발생했습니다. 다시 시도해 주세요.");
      return;
    }
    const data = await res.json();
    const text = data.result?.answer || data.result?.message || JSON.stringify(data.result);
    addMsg("assistant", text, data.intent);
  } catch {
    chatBox.removeChild(typing);
    addMsg("assistant", "서버에 연결할 수 없습니다.");
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (text) send(text);
});
</script>
</body>
</html>
